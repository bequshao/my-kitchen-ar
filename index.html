<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩემი AR სამზარეულო</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* მოდელის ზომა ეკრანზე */
        model-viewer {
            width: 100%;
            height: 500px;
            background-color: #f0f0f0;
        }

        /* ღილაკების პანელი */
        .controls {
            padding: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
        }
        
        .red { background-color: #ff4d4d; }
        .blue { background-color: #4d79ff; }
        .reset { background-color: #333; }
    </style>
</head>
<body>

    <model-viewer 
        id="kitchen-model"
        src="kitchen.glb" 
        ios-src="kitchen.usdz" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1"
        auto-rotate>
        
        <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 16px; right: 16px; padding: 10px;">
            👋 ნახე შენს ოთახში
        </button>
    </model-viewer>

    <div class="controls">
        <button class="red" onclick="changeColor('Material_Name_Here', [1, 0, 0, 1])">წითელი</button>
        <button class="blue" onclick="changeColor('Material_Name_Here', [0, 0, 1, 1])">ლურჯი</button>
        <button class="reset" onclick="changeColor('Material_Name_Here', [0.8, 0.8, 0.8, 1])">საწყისი</button>
    </div>

    <script>
        const modelViewer = document.querySelector('#kitchen-model');

        function changeColor(materialName, color) {
            // ვამოწმებთ, მზად არის თუ არა მოდელი
            if (!modelViewer.model) return;

            // ვპოულობთ მასალას მოდელში
            const material = modelViewer.model.materials.find(m => m.name === materialName);
            
            if (material) {
                // ვცვლით ძირითად ფერს
                material.pbrMetallicRoughness.setBaseColorFactor(color);
                
                // თუ მოდელს ტექსტურა აქვს, ის უნდა გავთიშოთ რომ ფერი გამოჩნდეს
                if (material.pbrMetallicRoughness.baseColorTexture) {
                    material.pbrMetallicRoughness.baseColorTexture.setTexture(null);
                }
                
                console.log(materialName + "-ის ფერი შეიცვალა!");
            } else {
                console.warn("მასალა ვერ მოიძებნა! შეამოწმე სახელი: " + materialName);
            }
        }
    </script>
</body>
</html>
