<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kitchen Showcase</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
        }

        /* AR ღილაკის სტილი */
        #ar-button {
            background-color: white;
            border-radius: 8px;
            border: 1px solid #ccc;
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            z-index: 999;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="kitchen.glb" 
        ios-src="kitchen.usdz" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1"
        auto-rotate>
        
        <button slot="ar-button" id="ar-button">
            👋 ნახე შენს ოთახში
        </button>
    </model-viewer>

</body>
</html><body>

    <model-viewer id="kitchen" src="kitchen.glb" ios-src="kitchen.usdz" ar camera-controls shadow-intensity="1">
        <button slot="ar-button" style="position: absolute; top: 10px; right: 10px;">AR ნახვა</button>
    </model-viewer>

    <div class="controls">
        <button class="red" onclick="changeColor([1, 0, 0, 1])">წითელი</button>
        <button class="blue" onclick="changeColor([0, 0, 1, 1])">ლურჯი</button>
        <button class="reset" onclick="location.reload()">საწყისი</button>
    </div>

    <script>
        const mv = document.querySelector('#kitchen');

        function changeColor(color) {
            if (!mv.model) {
                alert("მოდელი იტვირთება, დაიცადეთ!");
                return;
            }

            mv.model.materials.forEach((mat) => {
                mat.pbrMetallicRoughness.setBaseColorFactor(color);
                
                // ვთიშავთ ტექსტურას რომ ფერი გამოჩნდეს
                if (mat.pbrMetallicRoughness.baseColorTexture) {
                    mat.pbrMetallicRoughness.baseColorTexture.setTexture(null);
                }
            });
        }
    </script>

</body>
</html>
