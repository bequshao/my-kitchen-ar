<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurator</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        model-viewer { width: 100%; height: 400px; background: #eee; }
        
        /* ღილაკების კონტეინერი */
        .controls { 
            display: flex; 
            gap: 15px; 
            padding: 20px; 
            z-index: 100; /* რომ ყოველთვის ზემოდან იყოს */
        }

        button { 
            padding: 15px 25px; 
            font-size: 16px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none;
            color: white;
            font-weight: bold;
        }

        .red { background: #e74c3c; }
        .blue { background: #3498db; }
        .reset { background: #2c3e50; }
    </style>
</head>
<body>

    <model-viewer id="kitchen" src="kitchen.glb" ios-src="kitchen.usdz" ar camera-controls shadow-intensity="1">
        <button slot="ar-button" style="position: absolute; top: 10px; right: 10px;">AR ნახვა</button>
    </model-viewer>

    <div class="controls">
        <button class="red" onclick="changeColor([1, 0, 0, 1])">წითელი</button>
        <button class="blue" onclick="changeColor([0, 0, 1, 1])">ლურჯი</button>
        <button class="reset" onclick="location.reload()">საწყისი</button>
    </div>

    <script>
        const mv = document.querySelector('#kitchen');

        function changeColor(color) {
            if (!mv.model) {
                alert("მოდელი იტვირთება, დაიცადეთ!");
                return;
            }

            mv.model.materials.forEach((mat) => {
                mat.pbrMetallicRoughness.setBaseColorFactor(color);
                
                // ვთიშავთ ტექსტურას რომ ფერი გამოჩნდეს
                if (mat.pbrMetallicRoughness.baseColorTexture) {
                    mat.pbrMetallicRoughness.baseColorTexture.setTexture(null);
                }
            });
        }
    </script>

</body>
</html>
